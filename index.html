<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Hello my Love this is my little surprise <3</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100%; position: relative;">
    <div class="main-container">

      <h1 class="mb-5" style="font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 3.2rem; color: #5D3A1A;">
        Mayriel Antipuesto, will you be my girlfriend? 💕
      </h1>

      <img id="faceImage" src="img/worried.png" class="mb-4" style="max-width: 200px; width: 100%;">

      <div class="d-flex justify-content-center gap-5">
        <img id="noButton" src="img/no.png" style="cursor: pointer; max-width: 150px;">
        <img id="yesButton" src="img/yes.png" style="cursor: pointer; max-width: 150px;">
      </div>

      <div>
        <audio id="music" src="sound/cute_bg.mp3" loop autoplay muted></audio>
        <audio id="noSound" src="sound/no_sound.mp3" preload="auto"></audio>
        <audio id="yesSound" src="sound/yes_sound.mp3" preload="auto"></audio>
      </div>

    </div>
  </div>

<script>
const faceImage = document.getElementById('faceImage');
const noButton = document.getElementById('noButton');
const yesButton = document.getElementById('yesButton');

const music = document.getElementById('music');
const noSound = document.getElementById('noSound');
const yesSound = document.getElementById('yesSound');

let noClickCount = 0;
let musicStarted = false;

/* =========================
   MUSIC AUTO START FIX
========================= */
function startMusic() {
  if (!music || musicStarted) return;

  music.volume = 0.35;
  music.muted = false;

  const playPromise = music.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        musicStarted = true;
      })
      .catch(() => {
        console.log("Autoplay blocked — waiting for interaction");
      });
  }
}

/* Try autoplay on load */
window.addEventListener('DOMContentLoaded', () => {
  startMusic();
});

/* Fallback: unlock on ANY click */
document.addEventListener('click', () => {
  startMusic();
}, { once: true });

/* =========================
   BUTTON LOGIC
========================= */

noButton.addEventListener('click', () => {
  playSound(noSound);

  if (music) {
    music.volume = Math.max(0.02, music.volume - 0.02);
  }

  noClickCount++;

  if (noClickCount < 3) {
    moveButtonToRandomLocation(noButton);
  } else {
    faceImage.src = 'img/angry.png';
    noButton.style.display = 'none';
  }
});

yesButton.addEventListener('click', () => {
  faceImage.src = 'img/hearts.png';

  yesSound.currentTime = 0;
  yesSound.play().catch(() => {
    window.location.href = 'photos.html';
  });

  yesSound.onended = () => {
    window.location.href = 'photos.html';
  };
});

/* =========================
   UTILITIES
========================= */

function moveButtonToRandomLocation(button) {
  const w = window.innerWidth;
  const h = window.innerHeight;

  const x = Math.random() * (w - 150);
  const y = Math.random() * (h - 150);

  button.style.position = 'fixed';
  button.style.left = x + 'px';
  button.style.top = y + 'px';
  button.style.zIndex = '10';
}

function playSound(sound) {
  if (!sound) return;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}
</script>

</body>
</html>
