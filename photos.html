<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Photos</title>
  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1CmrxMRARb6aLqgBO7yyAxTOQE2AKb9GfXnE2J5Y6GmYl5G1G6Jjv3gk5v9vNQ5K" crossorigin="anonymous">
  <!-- Google Fonts - Fredoka (Cute) -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Modular styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    .photo-collage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 200px 200px;
      gap: 10px;
      margin-bottom: 2rem;
      max-width: 680px;
      width: 100%;
    }
    .photo-collage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      will-change: transform;
    }
    .photo-collage .large {
      grid-row: span 2;
    }
    .photos-content {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    .photos-note {
      background: rgba(255,255,255,0.9);
      padding: 1.5rem;
      border-radius: 8px;
      max-width: 320px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .photos-note p {
      margin: 0;
      color: #333;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    @media (max-width: 992px) {
      .photo-collage {
        grid-template-rows: 160px 160px;
        max-width: 100%;
      }
    }

    @media (max-width: 576px) {
      .photo-collage {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, 140px);
      }
      .photos-content {
        flex-direction: column;
      }
      .photos-note {
        max-width: 100%;
      }
    }
    /* floating animation for photos */
    @keyframes photoFloat {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      50% { transform: translateY(-10px) rotate(-1.5deg) scale(1.01); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }
    .photo-collage img.float {
      animation: photoFloat 3.6s ease-in-out both;
    }
  </style>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100%; position: relative;">
    <div class="main-container">
      <h1 class="mb-5">My Favourite Photos of us 💕</h1>
      
      <div class="photos-content">
        <div class="photo-collage">
          <img src="img/1.jpeg" alt="Photo 1" class="large">
          <img src="img/2.jpeg" alt="Photo 2">
          <img src="img/3.jpeg" alt="Photo 3">
        </div>
        
        <div class="photos-note">
          <p>Here are some photos we took together my love, every time I see these photos it just makes me miss you so  much Langga. 💕</p>
        </div>
      </div>
    </br>
      <button class="btn cute-next btn-lg mt-5" onclick="window.location.href='letter.html'">Next</button>
    </div>
  </div>

  <div id="backgroundMusic">
  <audio id="music" src="sound/cute_bg.mp3" loop></audio>
</div>
 <script>
const music = document.getElementById('music');
let musicStarted = false;

/* =========================
   MUSIC START SYSTEM
========================= */
function startMusic() {
  if (!music || musicStarted) return;

  music.volume = 0.35;

  const playPromise = music.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        musicStarted = true;
      })
      .catch(() => {
        console.log("Autoplay blocked — waiting for interaction");
      });
  }
}

/* Try autoplay on load */
window.addEventListener('DOMContentLoaded', () => {
  startMusic();
});

/* Fallback: start on first user interaction */
document.addEventListener('click', () => {
  startMusic();
}, { once: true });

/* =========================
   PHOTO FLOAT SYSTEM (your original)
========================= */
(function() {
  const photos = document.querySelectorAll('.photo-collage img');
  if (!photos || photos.length === 0) return;

  function triggerFloat() {
    const idx = Math.floor(Math.random() * photos.length);
    const el = photos[idx];
    if (!el) return;

    el.classList.add('float');

    const animDuration = 3600 + Math.floor(Math.random() * 2400);
    setTimeout(() => el.classList.remove('float'), animDuration);
  }

  function schedule() {
    const delay = 2500 + Math.floor(Math.random() * 6000);

    setTimeout(() => {
      if (Math.random() < 0.75) triggerFloat();
      schedule();
    }, delay);
  }

  setTimeout(schedule, 1200);
})();
</script>
</body>
</html>
