<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Flowers</title>
  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1CmrxMRARb6aLqgBO7yyAxTOQE2AKb9GfXnE2J5Y6GmYl5G1G6Jjv3gk5v9vNQ5K" crossorigin="anonymous">
  <!-- Google Fonts - Fredoka (Cute) -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Modular styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    .flowers-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    .flowers-image {
      max-width: 300px;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .flowers-message {
      background: rgba(255,255,255,0.95);
      padding: 2rem;
      border-radius: 8px;
      max-width: 400px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .flowers-message h2 {
      color: #d63384;
      margin-bottom: 1rem;
    }
    .flowers-message p {
      color: #333;
      font-size: 1rem;
      line-height: 1.8;
      margin: 0;
    }
    .flower-emojis {
      font-size: 3rem;
      margin: 1rem 0;
      letter-spacing: 0.5rem;
    }
    .flower-gallery {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .flower-gallery img {
      max-width: 180px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
      will-change: transform;
    }
    .flower-gallery img:hover {
      transform: translateY(-4px);
    }
    /* floating animation (applied intermittently via JS) */
    @keyframes floatMove {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      50% { transform: translateY(-12px) rotate(-2deg) scale(1.02); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }
    .flower-gallery img.float {
      animation: floatMove 3.2s ease-in-out both;
    }
    .flower-gallery .flower-big {
      max-width: 200px;
      flex: 0 0 200px;
    }
    .btn-cute-back {
      background: linear-gradient(180deg,#f6f2f3,#ffd0e0);
      color: #6a1b4d;
      border: 1px solid rgba(106,27,77,0.12);
      border-radius: 999px;
      padding: 0.7rem 1.4rem;
      font-family: 'Fredoka', sans-serif;
      box-shadow: 0 8px 18px rgba(255,181,208,0.12), inset 0 -2px 0 rgba(255,255,255,0.4);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .btn-cute-back:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 26px rgba(255,181,208,0.16);
    }
    .btn-cute-back:active {
      transform: translateY(-1px) scale(0.995);
      box-shadow: 0 6px 12px rgba(255,181,208,0.08);
    }
    @media (max-width: 768px) {
      .flower-gallery {
        gap: 0.75rem;
      }
      .flower-gallery .flower-big {
        max-width: 280px;
        flex: 0 0 280px;
      }
    }
  </style>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100%; position: relative;">
    <div class="main-container">
      <h1 class="mb-4">💕 For You My Love 💕</h1>
      
      <div class="flowers-container">
        
        <div class="flower-gallery">
          <img src="img/Flowers.png" alt="Flowers bouquet">
          <img src="img/flower_big.png" alt="Large flower display" class="flower-big">
          <img src="img/flower2.png" alt="Flower arrangement">
        </div>
        
        <div class="flowers-message">
          <h2>A Bouquet of Lilies for My Love</h2>
          <p>Lilies is such a beautiful flower and so are roses so I decided to get you both because you deserve even more.</p>
          <p style="margin-top: 1rem;">Thank you for Accepting my Love May. 💕</p>
        </div>
        
        </div>

        <div class="text-center"></br>
          <button class="btn-cute-back btn btn-lg mt-4" onclick="window.location.href='index.html'">Again</button>
        </div>
      </div>
    </div>
  </div>

  <div id="backgroundMusic">
    <audio id="music" src="sound/cute_bg.mp3" autoplay loop></audio>
  </div>
<script>
const music = document.getElementById('music');
let musicStarted = false;

/* =========================
   MUSIC SYSTEM FIX
========================= */
function startMusic() {
  if (!music || musicStarted) return;

  music.volume = 0.35;

  const playPromise = music.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        musicStarted = true;
      })
      .catch(() => {
        console.log("Autoplay blocked — waiting for interaction");
      });
  }
}

/* Try autoplay on load */
window.addEventListener('DOMContentLoaded', () => {
  startMusic();
});

/* Fallback: unlock on first interaction */
document.addEventListener('click', () => startMusic(), { once: true });
document.addEventListener('touchstart', () => startMusic(), { once: true });

/* =========================
   FLOWER FLOAT ANIMATION
   (your original, cleaned slightly)
========================= */
(function() {
  const imgs = document.querySelectorAll('.flower-gallery img');
  if (!imgs || imgs.length === 0) return;

  function triggerRandomFloat() {
    const i = Math.floor(Math.random() * imgs.length);
    const img = imgs[i];
    if (!img) return;

    img.classList.add('float');

    const duration = 3000 + Math.floor(Math.random() * 2500);
    setTimeout(() => {
      img.classList.remove('float');
    }, duration);
  }

  function scheduleNext() {
    const delay = 2000 + Math.floor(Math.random() * 5000);

    setTimeout(() => {
      if (Math.random() < 0.7) triggerRandomFloat();
      scheduleNext();
    }, delay);
  }

  setTimeout(scheduleNext, 1200);
})();
</script>
</body>
</html>
